<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Shifting Index</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Oswald:wght@600;700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* (YOUR ORIGINAL CSS — unchanged) */
body{margin:0;font-family:Hind Siliguri;background:#E7DCC6;}
.wrap{max-width:600px;margin:auto;padding:10px;}
.carton{background:#fff;margin:10px 0;padding:10px;border-radius:10px;}
.packed{background:#dff5df;}
</style>

</head>

<body>
<div class="wrap">

<h1>Home Shifting Index</h1>

<div id="list"></div>

</div>

<script>
/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://qoqvaiochvjpvdkrqjkg.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_KEY_HERE";
const SYNC_CODE = "hsi-bd-7f3k92";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ================= STATE ================= */
let state = { count: 20, cartons: {} };
const code = SYNC_CODE;

/* ================= LOAD ================= */
async function load() {
  const { data } = await sb
    .from("shifting")
    .select("*")
    .eq("id", code)
    .maybeSingle();

  if (data?.data) {
    state = data.data;
  } else {
    // 🔥 IMPORTANT FIX: create row if missing
    await sb.from("shifting").insert({
      id: code,
      data: state
    });
  }

  render();
  subscribe();
}

/* ================= SAVE ================= */
let saveTimer;

function save() {
  clearTimeout(saveTimer);

  saveTimer = setTimeout(async () => {
    const { error } = await sb
      .from("shifting")
      .upsert({
        id: code,
        data: state,
        updated_at: new Date().toISOString()
      });

    if (error) {
      console.error("SAVE ERROR:", error);
    }
  }, 300);
}

/* ================= REALTIME ================= */
function subscribe() {
  sb.channel("hsi-" + code)
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "shifting",
        filter: "id=eq." + code
      },
      (payload) => {
        const newData = payload.new?.data;
        if (!newData) return;

        state = newData;
        render();
      }
    )
    .subscribe();
}

/* ================= UI ================= */
function render() {
  const el = document.getElementById("list");
  el.innerHTML = "";

  for (let i = 1; i <= state.count; i++) {
    const c = state.cartons[i] || { c: "", p: false };

    const div = document.createElement("div");
    div.className = "carton" + (c.p ? " packed" : "");

    div.innerHTML = `
      <b>Box ${i}</b><br>

      <input value="${c.c || ""}" placeholder="contents"
        oninput="update(${i}, this.value)">

      <button onclick="toggle(${i})">
        ${c.p ? "Unpack" : "Pack"}
      </button>
    `;

    el.appendChild(div);
  }
}

/* ================= UPDATE ================= */
function update(i, val) {
  if (!state.cartons[i]) state.cartons[i] = { c: "", p: false };
  state.cartons[i].c = val;
  save();
}

function toggle(i) {
  if (!state.cartons[i]) state.cartons[i] = { c: "", p: false };
  state.cartons[i].p = !state.cartons[i].p;
  save();
  render();
}

/* ================= START ================= */
load();
</script>

</body>
</html>
